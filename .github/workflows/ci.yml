name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check
      - name: Cargo test
        run: cargo test

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download main benchmark baseline
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          branch: main
          name: benchmark-baseline
          path: .bench-baseline
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run benchmark gate
        run: |
          python3 scripts/bench_ci.py \
            --config benchmarks/ci_benchmarks.json \
            --output .bench-ci/benchmark-results.json \
            --baseline .bench-baseline/benchmark-results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .bench-ci/benchmark-results.json

      - name: Upload benchmark baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: .bench-ci/benchmark-results.json
